<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title id="page-title">Chat</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    .wrap {
      height: 100%;
      width: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      padding: 16px;
      background: var(--chat-bg, #FAF8F2);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.6);
      border: 1px solid var(--chat-border, #e6e1d8);
    }

    .title {
      font-weight: 700;
      font-size: 16px;
      color: var(--chat-text, #111);
    }

    #status {
      font-size: 13px;
      color: #666;
      white-space: nowrap;
    }

    #log {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 14px;
      border-radius: 16px;
      background: var(--chat-card, #fff);
      border: 1px solid var(--chat-border, #e6e1d8);
    }

    .row { margin: 10px 0; line-height: 1.45; font-size: 15px; }
    .me  { font-weight: 700; color: #0b5bd3; }
    .bot { font-weight: 700; color: #222; }

    .composer {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    #msg {
      flex: 1 1 auto;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #cfc7bb;
      background: #fff;
      font-size: 16px;
      line-height: 1.35;
      outline: none;
      overflow: auto;
    }

    #msg:focus { border-color: #7a6f60; }

    #send {
      flex: 0 0 auto;
      height: 44px;
      padding: 0 18px;
      border-radius: 14px;
      border: none;
      background: #111;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
    }

    #send:disabled, #msg:disabled { opacity: .6; cursor: not-allowed; }

    @media (max-width: 420px) {
      .wrap { padding: 12px; gap: 10px; }
      .title { font-size: 15px; }
      #send { padding: 0 14px; }
    }
  </style>
</head>

<body>
  <!-- ⚠️ NICHT ÄNDERN — Wird automatisch via CONFIG konfiguriert -->
  <div class="wrap">
    <div class="topbar">
      <div class="title" id="chat-title">Chat</div>
      <div id="status">Bereit.</div>
    </div>

    <div id="log"></div>

    <div class="composer">
      <textarea id="msg" placeholder="Schreib etwas…" autocomplete="off" rows="1"></textarea>
      <button id="send">Senden</button>
    </div>
  </div>

  <script src="./chat.js"></script>
</body>
</html>
